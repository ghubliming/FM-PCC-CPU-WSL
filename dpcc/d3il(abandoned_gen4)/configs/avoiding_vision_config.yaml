defaults:
  - agents: ddpm_encdec_vision

agent_name: ddpm_encdec_vision
log_dir: logs/avoiding_vision/

data_directory: environments/dataset/data/avoiding/data

wandb:
  entity: davidjia
  project: d3il

group: avoiding_vision_${agent_name}

hydra:
  run:
    dir: ${log_dir}/runs/${agent_name}/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${log_dir}/sweeps/${agent_name}/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.override_dirname}

seed: 42

# Network
hidden_dim: 128
num_hidden_layers: 6

# transformer
n_layer: 4
n_head: 4
n_embd: 72

# Training
train_batch_size: 64
val_batch_size: 64
num_workers: 4
device: 'cuda'
epoch: 4
eval_every_n_epochs: 2
scale_data: True

# Environment
obs_dim: 4
action_dim: 2
max_len_data: 200
window_size: 8

# Dataset
trainset:
  _target_: environments.dataset.avoiding_dataset.Avoiding_Img_Dataset
  data_directory: ${data_directory}
  obs_dim: ${obs_dim}
  action_dim: ${action_dim}
  max_len_data: ${max_len_data}
  window_size: ${window_size}

valset:
  _target_: environments.dataset.avoiding_dataset.Avoiding_Img_Dataset
  data_directory: ${data_directory}
  obs_dim: ${obs_dim}
  action_dim: ${action_dim}
  max_len_data: ${max_len_data}
  window_size: ${window_size}

# sim during training
train_simulation:
  _target_: simulation.avoiding_sim.Avoiding_Sim
  seed: ${seed}
  device: ${device}
  render: False
  n_cores: 1
  n_trajectories: 10
  if_vision: True

# Simulation
simulation:
  _target_: simulation.avoiding_sim.Avoiding_Sim
  seed: ${seed}
  device: ${device}
  render: True
  n_cores: 1
  n_trajectories: 100
  if_vision: True
